[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["*Tests"]

[tool.ruff]
line-length = 120
target-version = "py311"
extend-exclude = ["dist"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "C4", "SIM", "RUF"]
ignore = [
  "B904",
  "E501",
  "SIM105",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.mypy]
python_version = "3.11"
strict = true
warn_unreachable = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
  "hpr.excel.build_pivots",
]
disable_error_code = [
  "no-untyped-call",
  "no-untyped-def",
  "no-any-return",
]
